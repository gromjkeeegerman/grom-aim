<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>⚽ Угадай футболиста</title>
<link rel="manifest" href="manifest-guess.json">
<meta name="theme-color" content="#06150f">
<link rel="apple-touch-icon" href="icon.svg">
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
<style>
  :root{ --green:#16c784; --gold:#ffd23d; --cyan:#1ef0ff; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; }
  body{ font-family:'Segoe UI',Arial,sans-serif; color:#eafff4; overflow-y:auto; overflow-x:hidden; user-select:none; touch-action:manipulation;
    background:radial-gradient(680px 460px at 16% -5%, rgba(34,220,140,.20), transparent 60%),
              radial-gradient(680px 500px at 92% 105%, rgba(20,120,90,.25), transparent 60%),
              linear-gradient(165deg,#06150f,#0a2018 55%,#04100b); }
  #app{ position:relative; min-height:100vh; max-width:640px; margin:0 auto; display:flex; flex-direction:column; padding:14px; }
  .screen{ flex:1; display:flex; flex-direction:column; }
  .center{ align-items:center; justify-content:center; text-align:center; gap:14px; }
  .hidden{ display:none !important; }
  .logo{ font-weight:900; font-size:clamp(28px,7.5vw,46px); line-height:1.05;
    background:linear-gradient(90deg,#bff7df,var(--green),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .desc{ font-size:clamp(13px,3.7vw,16px); color:#c5e8d8; max-width:500px; line-height:1.55; }
  .btn{ font-weight:800; font-size:clamp(16px,5vw,21px); padding:14px 38px; border:none; border-radius:40px; cursor:pointer;
    color:#04140d; background:linear-gradient(90deg,var(--green),#7ef0bf); box-shadow:0 8px 26px rgba(22,199,132,.4); transition:transform .08s; }
  .btn:active{ transform:scale(.95); }
  .btn.gold{ background:linear-gradient(90deg,var(--gold),#fff0b0); }
  .note{ font-size:12px; color:#8fcdb4; }
  .support{ display:inline-block; margin-top:12px; text-decoration:none; font-weight:800; font-size:15px;
    padding:12px 24px; border-radius:30px; color:#fff; background:linear-gradient(90deg,#ff7a2f,#ff5151);
    box-shadow:0 8px 22px rgba(255,90,60,.35); }
  .support:active{ transform:scale(.96); }
  .hud{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; font-weight:800; }
  .hud .r{ color:#9fe9cf; font-size:13px; }
  .hud .sc{ color:var(--gold); font-size:clamp(18px,5.5vw,24px); }
  .card{ background:linear-gradient(180deg, rgba(13,40,30,.95), rgba(8,26,19,.95)); border:1px solid rgba(34,220,140,.32);
    border-radius:20px; padding:16px; box-shadow:0 16px 46px rgba(0,0,0,.4); margin-bottom:12px; animation:in .3s ease; }
  @keyframes in{ from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:none;} }
  .silho{ display:flex; justify-content:center; margin-bottom:6px; }
  .silho svg{ width:88px; height:88px; filter:drop-shadow(0 6px 14px rgba(34,220,140,.3)); }
  .qmark{ text-align:center; font-weight:900; font-size:20px; color:var(--gold); margin-bottom:10px; }
  .clues{ display:flex; flex-direction:column; gap:7px; margin-bottom:10px; }
  .clue{ background:rgba(34,220,140,.10); border:1px solid rgba(34,220,140,.25); border-radius:10px; padding:9px 12px; font-size:14px; font-weight:600; }
  .clue.locked{ color:#5f8a78; background:rgba(255,255,255,.03); border-style:dashed; }
  .hintbtn{ width:100%; padding:11px; border-radius:12px; border:1px dashed var(--gold); background:rgba(255,210,61,.08);
    color:var(--gold); font-weight:800; cursor:pointer; font-size:14px; }
  .hintbtn:disabled{ opacity:.4; cursor:default; }
  .answers{ display:flex; flex-direction:column; gap:9px; }
  .ans{ text-align:center; cursor:pointer; background:linear-gradient(180deg, rgba(15,46,34,.9), rgba(9,28,21,.9));
    border:1.5px solid rgba(120,240,191,.28); border-radius:13px; padding:14px; font-weight:700; font-size:clamp(14px,4vw,16px); transition:.14s; }
  .ans:active{ transform:scale(.99); }
  .ans.correct{ background:linear-gradient(180deg,#0c7a3e,#0a5e30); border-color:#39e07a; }
  .ans.wrong{ background:linear-gradient(180deg,#7a1020,#561019); border-color:#ff5a6c; }
  .ans.dim{ opacity:.4; }
  .reveal{ text-align:center; font-weight:800; margin:8px 0; font-size:16px; }
  .big{ font-weight:900; font-size:clamp(34px,11vw,70px); color:var(--gold); }
  .rank{ font-weight:900; font-size:clamp(22px,6vw,36px);
    background:linear-gradient(90deg,#bff7df,var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; }
</style>
</head>
<body>
<div id="app">
  <div id="start" class="screen center">
    <div class="silho">⚽</div>
    <div class="logo">УГАДАЙ<br>ФУТБОЛИСТА</div>
    <div class="desc">15 раундов · <b>почти 200 футболистов</b> всех эпох. Открывай подсказки по одной — но помни: <b style="color:#ffd23d">чем меньше подсказок, тем больше очков</b>. Узнаешь легенд?</div>
    <button class="btn gold" id="startBtn">ИГРАТЬ ⚽</button>
    <div class="note" id="best">рекорд: 0</div>
    <a class="support" href="https://www.donationalerts.com/r/gromovofficial" target="_blank" rel="noopener">☕ Поддержать автора</a>
  </div>

  <div id="game" class="screen hidden">
    <div class="hud">
      <div class="r">Раунд <span id="round">1</span>/15</div>
      <div class="sc">⭐ <span id="score">0</span></div>
      <div class="r">за угадку: <b style="color:#ffd23d"><span id="pts">100</span></b></div>
    </div>
    <div class="card">
      <div class="silho"><svg viewBox="0 0 100 100"><circle cx="50" cy="24" r="15" fill="#1aa06a"/><path d="M22 92 C22 64 36 52 50 52 C64 52 78 64 78 92 Z" fill="#1aa06a"/><circle cx="50" cy="50" r="48" fill="none" stroke="#16c784" stroke-width="2" stroke-dasharray="5 6" opacity="0.5"/></svg></div>
      <div class="qmark">Кто это? 🤔</div>
      <div class="clues" id="clues"></div>
      <button class="hintbtn" id="hint">🔍 Ещё подсказка (−15)</button>
    </div>
    <div id="reveal" class="reveal hidden"></div>
    <div class="answers" id="answers"></div>
    <div class="center hidden" id="nextWrap" style="flex:none;margin-top:8px"><button class="btn" id="nextBtn">ДАЛЬШЕ ▶</button></div>
  </div>

  <div id="end" class="screen center">
    <div class="silho">🏆</div>
    <div class="big" id="endScore">0</div>
    <div class="rank" id="endRank">—</div>
    <div class="desc" id="endMsg">—</div>
    <button class="btn gold" id="againBtn">ЕЩЁ РАЗ 🔁</button>
    <a class="support" href="https://www.donationalerts.com/r/gromovofficial" target="_blank" rel="noopener">⚡ Понравилось? Поддержи автора</a>
  </div>
</div>

игрок Африки","nickname":"Папа Кану"},{"name":"Джей-Джей Окоча","country":"Нигерия","position":"Полузащитник","era":"1990–2000-е","club":"ПСЖ, Болтон","achievement":"Король дриблинга; капитан сборной Нигерии","nickname":"Так хорош, что назвали дважды"}];
  (function(){
    var EMO=["🌍 ","⚽ ","📅 ","🏟️ ","🏆 ","🏷️ "];
    var seen={}; DB.forEach(function(p){ seen[(p.n||'').toLowerCase()]=1; });
    (EXTRA||[]).forEach(function(p){
      var k=(p.name||'').toLowerCase(); if(!p.name||seen[k]) return; seen[k]=1;
      DB.push({n:p.name, c:[EMO[0]+p.country,EMO[1]+p.position,EMO[2]+p.era,EMO[3]+p.club,EMO[4]+p.achievement,EMO[5]+p.nickname]});
    });
  })();
  var ROUNDS=15, FREE=1, COST=15;
  var pool=[], idx=0, score=0, shown=0, locked=false, cur=null;

  function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;} return a; }
  function show(el){ $('start').classList.add('hidden'); $('game').classList.add('hidden'); $('end').classList.add('hidden'); el.classList.remove('hidden'); }
  function curPts(){ return Math.max(40, 100 - Math.max(0,shown-FREE)*COST); }

  function round(){
    cur=pool[idx]; shown=FREE; locked=false;
    $('round').textContent=(idx+1); $('score').textContent=score; $('pts').textContent=curPts();
    $('reveal').classList.add('hidden'); $('nextWrap').classList.add('hidden');
    $('hint').disabled=false; $('hint').textContent='🔍 Ещё подсказка (−'+COST+')';
    renderClues();
    function bp(card){ var p=(card.c[1]||'').toLowerCase();
      if(p.indexOf('вратар')>=0) return 'gk';
      if(p.indexOf('полузащ')>=0) return 'mf';
      if(p.indexOf('защит')>=0) return 'df';
      if(p.indexOf('напад')>=0||p.indexOf('форвард')>=0||p.indexOf('край')>=0) return 'fw';
      return 'x'; }
    var myp=bp(cur), opts=[cur.n];
    var same=shuffle(DB.filter(function(x){return x.n!==cur.n && bp(x)===myp;})).map(function(x){return x.n;});
    var diff=shuffle(DB.filter(function(x){return x.n!==cur.n && bp(x)!==myp;})).map(function(x){return x.n;});
    var cand=same.concat(diff);
    for(var oi=0; oi<5 && oi<cand.length; oi++) opts.push(cand[oi]);
    opts=shuffle(opts);
    var box=$('answers'); box.innerHTML='';
    opts.forEach(function(nm){ var b=document.createElement('div'); b.className='ans'; b.textContent=nm;
      b.addEventListener('pointerdown',function(){ answer(nm,b); },{passive:true}); box.appendChild(b); });
  }
  function renderClues(){
    var h=''; cur.c.forEach(function(cl,i){ h+= i<shown ? '<div class="clue">'+cl+'</div>' : '<div class="clue locked">🔒 подсказка скрыта</div>'; });
    $('clues').innerHTML=h; $('pts').textContent=curPts();
    if(shown>=cur.c.length){ $('hint').disabled=true; $('hint').textContent='Подсказок больше нет'; }
  }
  function hint(){ if(locked||shown>=cur.c.length) return; shown++; renderClues(); }

  function answer(nm, el){
    if(locked) return; locked=true; $('hint').disabled=true;
    var ok=nm===cur.n, nodes=document.querySelectorAll('.ans');
    nodes.forEach(function(n){ if(n.textContent===cur.n) n.classList.add('correct'); else if(n===el) n.classList.add('wrong'); else n.classList.add('dim'); });
    if(ok){ var p=curPts(); score+=p; $('reveal').innerHTML='✅ Верно! <b style="color:#ffd23d">+'+p+'</b>'; }
    else{ $('reveal').innerHTML='❌ Это был <b>'+cur.n+'</b>'; }
    $('reveal').classList.remove('hidden'); $('score').textContent=score; $('nextWrap').classList.remove('hidden');
  }
  function next(){ idx++; if(idx>=ROUNDS) end(); else round(); }

  function rankFor(s){
    if(s>=1300) return ['ЛЕГЕНДА-ЗНАТОК 🏆','Ты знаешь футбол как никто!'];
    if(s>=1000) return ['ФУТБОЛЬНЫЙ ГУРУ 🌟','Почти безупречно.'];
    if(s>=700) return ['ЭКСПЕРТ 🔥','Сильно, уважение.'];
    if(s>=400) return ['ЗНАТОК ⚽','Хорошо разбираешься.'];
    return ['БОЛЕЛЬЩИК 🍺','Есть куда расти — давай ещё!'];
  }
  function end(){
    var best=0; try{ best=parseInt(localStorage.getItem('guessfoot_best')||'0',10)||0; }catch(e){}
    var rec=score>best; if(rec){ best=score; try{ localStorage.setItem('guessfoot_best',String(best)); }catch(e){} }
    var r=rankFor(score);
    $('endScore').textContent=score; $('endRank').textContent=r[0];
    $('endMsg').innerHTML=r[1]+'<br><span class="note">очков · рекорд: '+best+(rec?' 🆕':'')+'</span>';
    show($('end'));
  }
  function start(){ pool=shuffle(DB.slice()).slice(0,ROUNDS); idx=0; score=0; show($('game')); round(); }
  function refreshBest(){ var b=0; try{ b=parseInt(localStorage.getItem('guessfoot_best')||'0',10)||0; }catch(e){} $('best').textContent='рекорд: '+b; }

  $('startBtn').addEventListener('click', start);
  $('againBtn').addEventListener('click', start);
  $('hint').addEventListener('click', hint);
  $('nextBtn').addEventListener('click', next);
  refreshBest();
})();
</script>
